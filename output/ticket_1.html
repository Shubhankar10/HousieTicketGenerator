border-spacing format:
horizontal-gap vertical-gap

border-spacing: 5px 8px;
*/

cell design if needed
------------------------- */

/* background-image:url("whiteCircle.png");   */
/* optional cell background */

background-size: 90%;
background-position: center;
background-repeat:no-repeat;

}
