<!DOCTYPE html>
<html>
<head>

<style>

/* IMPORT FONT */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap');


/* Remove default browser spacing */
body{
margin:0;
padding:0;
font-family: 'Poppins', sans-serif; /* default font */
}

/* Container for the ticket */
.ticket{
position:relative;
width:800px;   /* Adjust if your background image size differs */
height:500px;  /* Adjust if your background image size differs */
}

/* Background ticket design */
.bg{
width:100%;
height:100%;
position:absolute;
top:0;
left:0;
}

/* -------------------------
TABLE POSITION
Change these values to move
the housie grid around
------------------------- */

.table{
position:absolute;

/* WhiteBG */
left:30px;   
top:280px;  


/* left:350px;   
top:200px;    */
border:2px solid black;   
/* CHANGE border thickness/color */

border-collapse:collapse;
/* -------------------------
ROW GAP
Increase/decrease vertical spacing
between rows
------------------------- */

/* border-spacing:0px 8px; */

/*
border-spacing format:
horizontal-gap vertical-gap

Example:
border-spacing: 5px 8px;
*/
}


/* -------------------------
CELL STYLE
------------------------- */

td{

width:40px;      /* CHANGE column width */
height:40px;     /* CHANGE row height */

text-align:center;

font-family:'Poppins', sans-serif; /* FONT FOR NUMBERS */
font-size:20px;
font-weight:600;

border:2px solid black;
   /* CHANGE grid thickness/color */

/* -------------------------
COLUMN GAP
Adjust left/right spacing
------------------------- */

padding-left:2px;
padding-right:2px;


/* -------------------------
CELL BACKGROUND IMAGE
Replace with your own
cell design if needed
------------------------- */

/* background-image:url("whiteCircle.png");   */
/* optional cell background */

background-size: 90%;
background-position: center;
background-repeat:no-repeat;

}

</style>

</head>

<body>

<div class="ticket">

<!-- MAIN BACKGROUND IMAGE -->
<img src="{{ image_path }}" class="bg">


<!-- HOUSIE NUMBER GRID -->
<table class="table">

{% for row in ticket %}
<tr>

{% for num in row %}

<td>
{% if num %}
{{num}}
{% endif %}
</td>

{% endfor %}

</tr>
{% endfor %}

</table>

</div>

</body>
</html>
